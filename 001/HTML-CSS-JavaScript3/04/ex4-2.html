<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      h2 {
        color: red;
      }
    </style>
  </head>
  <body>
    <h2>클래식 기타</h2>
    <h3>개요</h3>
    <p style="color:green;">
      클래식 기타는 기타 악기의 하나로, 나일론이나 양의 창자로 만든 거트로 제작한 현을 뜯어서 소리를 내는 류트족 현악기의 일종이다.
    </p>
    <h3>수명</h3>
    <p>
      기타의 수명은 20~30년에 불과하다는 말이 있는데 이는 잘못된 정보이다. 잘 건조된 고품질의 목재를 재료로 하여 튼튼한 구조로 제대로
      제작하여 일정한 온습도로 관리하면 기타의 수명은 100년 이상이다.
    </p>
  </body>
</html>
