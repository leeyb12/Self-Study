<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      a:link {
        color: grey;
        text-decoration: none;
      }
      a:visited {
        color: grey;
        text-decoration: none;
      }
      a:hover {
        color: orange;
        text-decoration: underline;
      }
      a:active {
        color: grey;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h3>기타의 종류</h3>
    <ul>
      <li><a href="#">클래식 기타</a></li>
      <li><a href="#">어쿠스틱 기타</a></li>
      <li><a href="#">일렉 기타</a></li>
    </ul>
  </body>
</html>
