<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      * {
        margin: 0;
      }
      h3 {
        margin: 30px;
        border: solid 1px green;
      }
      p {
        margin-top: 60px;
        margin-bottom: 60px;
        margin-left: 50px;
        margin-right: 50px;
        border: solid 1px green;
      }
    </style>
  </head>
  <body>
    <h3>박스 모델</h3>
    <p>
      웹 페이지에 있는 모든 HTML 요소는 사각형 형태를 가지는 박스로 생각할 수 있다. CSS에서는 이러한 박스를 기반으로 하여 요소에 경계선을 그릴 수 있으며
      여백을 조정하여 요소를 화면에 배치할 수 있게 한다.
    </p>
  </body>
</html>
